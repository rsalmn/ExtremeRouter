name: Publish CLI to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  publish:
    name: Build & Publish CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install app dependencies (for build)
        run: npm ci
        working-directory: .

      - name: Build Next.js standalone (traced into CLI bundle)
        run: npm run build
        working-directory: .
        env:
          NEXT_TRACING_ROOT_MODE: workspace

      - name: Build & pack CLI
        run: npm run pack:cli
        working-directory: .
        env:
          NEXT_TRACING_ROOT_MODE: workspace

      - name: Inspect tarball
        run: |
          echo "## CLI tarball" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TARFILE=$(ls -1 *.tgz | head -1)
          echo "File: \`$TARFILE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm view ./cli version || true
          tar -tzf "$TARFILE" | head -30 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --access public
        working-directory: .
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: npm publish --dry-run --access public
        working-directory: .
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
